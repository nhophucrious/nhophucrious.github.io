name: Build Resume PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'resume/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: resume
          
      - name: Create assets/docs directory
        run: mkdir -p assets/docs
        
      - name: Copy PDF to assets
        run: |
          cp resume/main.pdf assets/docs/PhucNguyen-Mobile-developer-resume.pdf
          
      - name: Commit and push PDF
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add assets/docs/PhucNguyen-Mobile-developer-resume.pdf
          git diff --staged --quiet || git commit -m "Auto-update resume PDF [skip ci]"
          git push
